apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-nginx
  labels:
    course: DevOps 
    now: K8s 
    colour: blue
spec:
  replicas: 3
  selector:
    matchLabels:
      course: DevOps 
      now: K8s
      colour: blue
  template:
    metadata:
      labels:
        course: DevOps 
        now: K8s
        colour: blue
    spec:
      containers:
      - name: nginx
        image: nginx